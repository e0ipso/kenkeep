schema_version: 1
drainBound: 5
maxAttempts: 3
proposalTimeout: 60000
lockTtlMs: 1800000
indexBudgetTokens: 2000
curationThreshold: 5
bootstrapTokenBudget: 10000
logsRetentionDays: 30
# Optional per-subprocess model/effort. Omit any block to inherit the
# user's `claude` CLI default for that context.
proposalModel:
  name: haiku
  effort: low
curatorModel:
  name: sonnet
  effort: medium
bootstrapModel:
  name: sonnet
  effort: medium
