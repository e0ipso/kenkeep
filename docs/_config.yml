title: 'kenkeep'
description: 'A team-shared, git-native knowledge base for AI coding sessions. Built up in your repo, reviewed and versioned like code, with no extra infrastructure to run.'
url: https://mateuaguilo.com
baseurl: '/kenkeep'

# Just the Docs theme configuration
remote_theme: just-the-docs/just-the-docs

# Theme settings: kenkeep brand schemes (see docs/_sass/color_schemes/).
# Default load is the light scheme; the sidebar toggle swaps to kenkeep-dark.
color_scheme: kenkeep
search_enabled: true
heading_anchors: true

# Mermaid support (built into Just the Docs)
mermaid:
  version: '10.6.1'

# Navigation
nav_sort: case_sensitive

# Repository link in header
aux_links:
  'View on GitHub':
    - 'https://github.com/e0ipso/kenkeep'
  'npm':
    - 'https://www.npmjs.com/package/kenkeep'

# Make aux links open in a new tab
aux_links_new_tab: true

# SEO and social media
author: e0ipso
twitter:
  username: e0ipso

# Jekyll plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Markdown processing
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
