<!-- Tri-state color-theme toggle (System / Light / Dark) at the foot of the
     sidebar nav. Markup only — the controller lives in head_custom.html, which
     renders once and wires every .kk-theme__btn (this include is rendered
     twice by the theme, for the desktop and mobile navs). -->
<div class="kk-theme">
  <button
    type="button"
    class="kk-theme__btn"
    aria-label="Toggle color theme"
    title="Toggle color theme"
  >
    <span class="kk-theme__icon" aria-hidden="true"></span>
    <span class="kk-theme__label">System</span>
  </button>
</div>
